version: '3.9'

services:
  postgres:
    image: postgres:16

    container_name: fastgo_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fastgo123
      POSTGRES_DB: fastgo

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
